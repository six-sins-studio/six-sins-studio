<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Six Sins Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

/* CUSTOM FONT */

@font-face {
font-family: 'CloisterBlack';
src: url('./CloisterBlack.ttf') format('truetype');
font-weight: normal;
font-style: normal;
}

html{
scroll-behavior:smooth;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
color:white;
font-family:'Playfair Display', serif;
}

/* NAVIGATION */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:100;
}

nav a{
color:white;
text-decoration:none;
margin-left:30px;
font-size:16px;
}

nav a:hover{
color:#c40000;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:radial-gradient(circle,#2b0000,#000);
}

.hero-content{
margin-top:80px;
}

.logo{
width:150px;
margin-bottom:30px;
}

/* TITLE */

h1{
font-family:'CloisterBlack', serif;
font-size:80px;
letter-spacing:4px;
margin-bottom:20px;
}

/* TAGLINE */

.tagline{
font-size:24px;
}

.tagline-de{
font-size:16px;
color:#aaa;
margin-top:5px;
}

/* SECTIONS */

.section{
padding:140px 15%;
border-top:1px solid rgba(255,255,255,0.05);
}

/* SECTION TITLES */

.section-title{
font-family:'CloisterBlack', serif;
font-size:46px;
margin-bottom:60px;
letter-spacing:3px;
}

.section-title-de{
font-size:18px;
color:#aaa;
margin-bottom:40px;
}

/* SINS */

.sin{
font-size:28px;
margin-bottom:8px;
}

.sin span{
color:#c40000;
}

.sin-de{
font-size:16px;
color:#aaa;
margin-bottom:25px;
}

/* SERVICES */

.service{
font-size:28px;
margin-bottom:10px;
}

.service-de{
font-size:16px;
color:#aaa;
margin-bottom:25px;
}

/* CONTACT */

.contact{
font-size:20px;
line-height:2;
}

.contact a{
color:#c40000;
text-decoration:none;
}

/* FOOTER */

footer{
padding:60px;
text-align:center;
color:#777;
border-top:1px solid rgba(255,255,255,0.05);
}

footer a{
color:#777;
font-size:12px;
text-decoration:none;
}

</style>

</head>
